http:
  middlewares:
    redirect-to-root:
      redirectRegex:
        regex: "^https://[^.]+\\.kaoshome\\.dev"
        replacement: "https://kaoshome.dev"
        permanent: false

  routers:
    kaos-dashboard:
      rule: "Host(`kaoshome.dev`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: kaos-dashboard

    catch-all:
      rule: "HostRegexp(`^[a-z0-9]+[a-z0-9-]*\\.kaoshome\\.dev$`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
        domains:
          - main: "*.kaoshome.dev"
            sans:
              - "kaoshome.dev"
      middlewares:
        - redirect-to-root
      service: kaos-dashboard
      priority: 1

  services:
    kaos-dashboard:
      loadBalancer:
        servers:
          - url: "http://kaos-dashboard:80"
