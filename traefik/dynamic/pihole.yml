http:
  middlewares:
    pihole-redirect:
      redirectRegex:
        regex: "^https?://([^/]+)/?$"
        replacement: "https://${1}/admin"
        permanent: true

  routers:
    pihole:
      rule: "Host(`pihole.kaoshome.dev`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: pihole
      middlewares:
        - pihole-redirect

  services:
    pihole:
      loadBalancer:
        servers:
          - url: "http://192.168.178.39"
