services:
  database:
    image: postgres:15
    container_name: lista-database
    environment:
      POSTGRES_DB: lista
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - lista-postgres:/var/lib/postgresql/data
    networks:
      - lista-network
    restart: unless-stopped

  db-migrations:
    image: ghcr.io/gabrielaleks/lista-migrations:latest
    container_name: lista-db-migrations
    environment:
      - DATABASE_URL=${DATABASE_MIGRATION_URL}
      - DBMATE_MIGRATIONS_TABLE=${DBMATE_MIGRATIONS_TABLE}
      - DBMATE_WAIT=true
      - DBMATE_MIGRATIONS_DIR=/db/migrations
    depends_on:
      - database
    command: 'up'
    networks:
      - lista-network

  backend:
    image: ghcr.io/gabrielaleks/lista-backend:latest
    container_name: lista-backend
    ports:
      - '${BACKEND_PORT}:3000'
    environment:
      - PORT=${BACKEND_PORT}
      - ENVIRONMENT=${ENVIRONMENT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - ENABLE_SQL_LOGGING=${ENABLE_SQL_LOGGING}
      - ENABLE_FILE_LOGGING=${ENABLE_FILE_LOGGING}
      - PUBLIC_FRONTEND_URL=${PUBLIC_FRONTEND_URL}
    depends_on:
      - database
      - db-migrations
    networks:
      - lista-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/gabrielaleks/lista-frontend:latest
    container_name: lista-frontend
    depends_on:
      - backend
    networks:
      - lista-network
      - traefik
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lista-frontend.rule=Host(`lista.kaos`)"
      - "traefik.http.routers.lista-frontend.entrypoints=web"
      - "traefik.http.services.lista-frontend.loadbalancer.server.port=80"


volumes:
  lista-postgres:

networks:
  lista-network:
    driver: bridge
  traefik:
    external: true